<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>COLETA DE DADOS</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="topbar">
      <h1>COLETA DE DADOS</h1>
    </header>

    <main class="collection">
      <section class="card participant-card" aria-labelledby="participant-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Identificação</p>
            <h2 id="participant-title">Rodada de avaliação</h2>
          </div>
          <span class="status-chip neutral" id="completionStatus">Aguardando dados</span>
        </div>

        <div class="settings-grid">
          <label>
            Participante
            <input id="participant" type="text" autocomplete="off" placeholder="Ex.: P01">
          </label>
          <label>
            Avaliador
            <input id="evaluator" type="text" autocomplete="off" placeholder="Ex.: Nome">
          </label>
          <label>
            Data
            <input id="collectionDate" type="date">
          </label>
          <label>
            Limite ETM perímetros (%)
            <input id="targetPerimeter" type="number" step="0.1" value="1.0">
          </label>
          <label>
            Limite ETM dobras cutâneas (%)
            <input id="targetSkinfold" type="number" step="0.1" value="5.0">
          </label>
        </div>
      </section>

      <section class="step card active" id="measureOneSection" aria-labelledby="measure-one-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Etapa 1</p>
            <h2 id="measure-one-title">Medida 1</h2>
          </div>
          <span class="step-number">1</span>
        </div>
        <div class="measure-layout">
          <div>
            <h3>Perímetros corporais <span>cm</span></h3>
            <div class="field-list" id="perimeterMeasureOne"></div>
          </div>
          <div class="skin-card">
            <h3>Dobras cutâneas <span>mm</span></h3>
            <div class="field-list" id="skinfoldMeasureOne"></div>
          </div>
        </div>
        <div class="toolbar">
          <button class="primary" type="button" id="goMeasureTwo">Avançar para medida 2</button>
        </div>
      </section>

      <section class="step card" id="measureTwoSection" aria-labelledby="measure-two-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Etapa 2</p>
            <h2 id="measure-two-title">Medida 2</h2>
          </div>
          <span class="step-number">2</span>
        </div>
        <div class="measure-layout">
          <div>
            <h3>Perímetros corporais <span>cm</span></h3>
            <div class="field-list" id="perimeterMeasureTwo"></div>
          </div>
          <div class="skin-card">
            <h3>Dobras cutâneas <span>mm</span></h3>
            <div class="field-list" id="skinfoldMeasureTwo"></div>
          </div>
        </div>
        <div class="toolbar">
          <button class="primary" type="button" id="goResults">Ver resultados</button>
        </div>
      </section>

      <section class="step card" id="resultsSection" aria-labelledby="results-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Etapa 3</p>
            <h2 id="results-title">ETM final</h2>
          </div>
          <span class="step-number">3</span>
        </div>

        <div class="pmb-grid" id="muscleResults"></div>

        <div class="review-wrap">
          <table>
            <thead>
              <tr>
                <th>Variável</th>
                <th>Unidade</th>
                <th>Medida 1</th>
                <th>Medida 2</th>
                <th>Diferença</th>
                <th>ETM</th>
                <th>ETM%</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="reviewRows"></tbody>
          </table>
        </div>

        <label class="finalize-check" id="overrideBox">
          <input id="overrideOutOfTarget" type="checkbox">
          Finalizar a avaliação mesmo com ETM fora de alvo
        </label>

        <div class="download-notice" id="downloadNotice" aria-live="polite"></div>

        <div class="toolbar sticky-actions">
          <button class="primary" type="button" id="saveExcel">Salvar Excel</button>
          <button type="button" id="clearAll">Limpar rodada</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
